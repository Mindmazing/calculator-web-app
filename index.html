<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator By Fredy</title>
    <script src="./index.js" defer></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1>Calculator</h1>
    <div class="calculator-body">
      <div class="screen-container">
        <input type="text" id="calculator-screen" />
      </div>
      <div class="buttons-container">
        <div class="btn-row">
          <button class="btn number-btn">7</button>
          <button class="btn number-btn">8</button>
          <button class="btn number-btn">9</button>
          <button class="btn" id="divide-btn">&divide;</button>
        </div>
        <div class="btn-row">
          <button class="btn number-btn">4</button>
          <button class="btn number-btn">5</button>
          <button class="btn number-btn">6</button>
          <button class="btn" id="multiply-btn">x</button>
        </div>
        <div class="btn-row">
          <button class="btn number-btn">1</button>
          <button class="btn number-btn">2</button>
          <button class="btn number-btn">3</button>
          <button class="btn" id="subtract-btn">-</button>
        </div>
        <div class="btn-row">
          <button class="btn number-btn">0</button>
          <button class="btn" id="decimal-btn">.</button>
          <button class="btn" id="solve-btn">=</button>
          <button class="btn" id="add-btn">+</button>
        </div>
      </div>
    </div>
  </body>
</html>
